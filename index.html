<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Garbage Reporting System</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
    <div id="app">
        <!-- Login Screen -->
        <div id="login-screen" class="screen active">
            <div class="login-container">
                <div class="logo">
                    <i class="fas fa-recycle"></i>
                    <h1>Garbage Report</h1>
                </div>
                <div class="login-tabs">
                    <button class="tab-btn active" onclick="switchTab('user')">User</button>
                    <button class="tab-btn" onclick="switchTab('admin')">Admin</button>
                </div>
                <form id="login-form">
                    <input type="email" id="email" placeholder="Email" required>
                    <input type="password" id="password" placeholder="Password" required>
                    <button type="submit" id="login-btn">Login</button>
                </form>
                <div class="demo-links">
                    <p>Demo: <a href="#" onclick="loginDemo('user')">User Login</a> | <a href="#" onclick="loginDemo('admin')">Admin Login</a></p>
                </div>
            </div>
        </div>

        <!-- User Dashboard -->
        <div id="user-dashboard" class="screen">
            <header>
                <div class="header-left">
                    <i class="fas fa-user-circle" onclick="logout()"></i>
                    <span id="user-name">User</span>
                </div>
                <h1><i class="fas fa-recycle"></i> Report Garbage</h1>
            </header>
            <main>
                <form id="report-form" class="report-form">
                    <div class="form-group">
                        <label>Location</label>
                        <div id="map" class="map-container"></div>
                        <input type="text" id="location-text" placeholder="Click map to set location" readonly>
                        <input type="hidden" id="lat" name="lat">
                        <input type="hidden" id="lng" name="lng">
                    </div>
                    <div class="form-group">
                        <label>Description</label>
                        <textarea id="description" placeholder="Describe the garbage issue..." required></textarea>
                    </div>
                    <div class="form-group">
                        <label>Upload Photo</label>
                        <input type="file" id="image" accept="image/*" required>
                        <div id="image-preview" class="image-preview"></div>
                    </div>
                    <button type="submit">Submit Report</button>
                </form>
                <div id="my-reports" class="reports-section">
                    <h3>My Reports</h3>
                    <div id="user-reports-list"></div>
                </div>
            </main>
        </div>

        <!-- Admin Dashboard -->
        <div id="admin-dashboard" class="screen">
            <header>
                <div class="header-left">
                    <i class="fas fa-user-shield" onclick="logout()"></i>
                    <span id="admin-name">Admin</span>
                </div>
                <h1><i class="fas fa-chart-bar"></i> Admin Panel</h1>
            </header>
            <main>
                <div class="stats-grid">
                    <div class="stat-card">
                        <h3>Total Reports</h3>
                        <span id="total-reports">0</span>
                    </div>
                    <div class="stat-card">
                        <h3>Pending</h3>
                        <span id="pending-reports">0</span>
                    </div>
                    <div class="stat-card">
                        <h3>In Progress</h3>
                        <span id="in-progress-reports">0</span>
                    </div>
                    <div class="stat-card">
                        <h3>Resolved</h3>
                        <span id="resolved-reports">0</span>
                    </div>
                </div>
                <div class="admin-reports">
                    <div class="search-filter">
                        <input type="text" id="search-reports" placeholder="Search reports...">
                        <select id="filter-status">
                            <option value="">All Status</option>
                            <option value="pending">Pending</option>
                            <option value="in-progress">In Progress</option>
                            <option value="resolved">Resolved</option>
                        </select>
                    </div>
                    <div id="admin-reports-list"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- Image Modal -->
    <div id="image-modal" class="modal">
        <span class="close" onclick="closeModal()">&times;</span>
        <img id="modal-image" src="">
    </div>

    <script src="script.js"></script>
    <script async defer src="https://maps.googleapis.com/maps/api/js?key=YOUR_GOOGLE_MAPS_API_KEY&callback=initMap"></script>
</body>
</html>
